risks:
  - risk: Message ID mismatch between frontend and Firestore
    likelihood: high
    impact: high
    mitigation: Refactor useChat.ts to propagate real doc IDs after addDoc()
  - risk: UI clutter on AssistantBubble
    likelihood: medium
    impact: medium
    mitigation: Show rating button only on hover/focus; use compact popover
  - risk: Data migration of existing feedback docs
    likelihood: low
    impact: medium
    mitigation: Write migration script; test on staging first
  - risk: Firestore rule misconfiguration
    likelihood: low
    impact: high
    mitigation: Test rules locally before deploy; add to firebase-config-manual.md

success_criteria:
  - Users can rate conversations with a multi-field form (tone, length, usability, overall, comment)
  - Users can rate individual assistant messages via popover (pertinence, accuracy, expected answer)
  - Message rating popover opens from an action button on each assistant bubble
  - Admin dashboard shows both rating types with stats and listings
  - Existing feedback data is migrated to the new schema
  - Firestore rules enforce auth for creation and admin for reads on both collections
  - No regression in existing chat functionality

estimated_effort: "4.5 days (1 backend, 2 frontend, 0.5 infra, 1 testing/polish)"
