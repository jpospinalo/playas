  - area: Backend endpoints
    impact: high
    files:
      - rag/api/routes/feedback.py
      - rag/api/routes/admin.py
  - area: Frontend types
    impact: medium
    files:
      - frontend/lib/types.ts
  - area: Frontend API client
    impact: medium
    files:
      - frontend/lib/api.ts
  - area: Chat state management
    impact: high
    files:
      - frontend/hooks/useChat.ts
  - area: Conversation feedback UI
    impact: high
    files:
      - frontend/components/chat/FeedbackModal.tsx
      - frontend/components/chat/FeedbackButton.tsx
  - area: Message rating UI
    impact: high
    files:
      - frontend/components/chat/AssistantBubble.tsx
